# image_viewer config file
# Lines starting with # are ignored.
# Whitespace around = is stripped.

# ---- Float parameter -------------------------------------------------------
# Resize factor applied to every image on load.
# 1.0 = original size, 0.5 = half size, 2.0 = double size.
scale_factor = 1.0

# ---- Integer parameter -----------------------------------------------------
# Radius (pixels) of the filled green circle drawn on left-click.
circle_radius = 10

# ---- Move step -------------------------------------------------------------
# Fraction of the raw image width used as a movement step (0.0, 1.0].
# e.g. 0.01 = 1% of image width.
move_step_pct = 0.01

# ---- Line rows -------------------------------------------------------------
# Comma-separated list of fractional row positions [0.0, 1.0] at which
# horizontal green lines are drawn across the image.
# 0.0 = top edge, 1.0 = bottom edge.
# Any number of values is allowed; values outside [0.0, 1.0] are ignored.
line_rows = 0.22, 0.35, 0.55

# ---- Cropping --------------------------------------------------------------
# Fraction of image height to remove from the top and bottom before training.
# These values are written to dataset.info for use by downstream tools.
# 0.0 = no cropping.  Example: crop_top = 0.10 removes the top 10%.
crop_top    = 0.15
crop_bottom = 0.18

# ---- Paths -----------------------------------------------------------------
# image_dir is normally set via the -ds command-line flag:
#   ./image_viewer -ds <dataset>
# which resolves to  training_data/<dataset>/
# You can still override it here as a fallback if -ds is not supplied.
# image_dir = images

# Output is always written to labels.csv in the image directory.
# This is not configurable.
