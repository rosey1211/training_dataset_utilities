# augment.ini — configuration for the augment tool
# Lines starting with # are ignored.
# Whitespace around = is stripped.

# ---- Horizontal shift ------------------------------------------------------
# Maximum horizontal shift expressed as a fraction of image width [0.0, 1.0].
# The actual shift for each copy is drawn uniformly from
# [-max_shift_frac, +max_shift_frac] — negative = left, positive = right.
max_shift_frac = 0.05

# ---- Augmentations per image -----------------------------------------------
# Number of augmented versions generated for each source image.
# Each version is independently a random horizontal shift or a random warp.
num_augmentations = 5

# ---- Row-varying lateral warp (perspective shift) --------------------------
# Formula: colShiftFrac = sign * A * (exp(k * (lowestFrac - rowFrac)^n) - 1.0)
#
# x = lowestFrac - rowFrac is the normalised distance above the bottom label
# row (0 at the bottom row, increases toward the top of the image).
#
# warp_A_max : A is drawn randomly from [0, warp_A_max] for each image,
#     giving variable warp strength.  A = 0.2 allows shifts up to 20% of
#     image width at the top label row.  Set warp_A_max = 0.0 to disable.
#
# warp_k_max : k is drawn randomly from [0, warp_k_max] for each image.
#     Higher k → curve rises faster and more steeply.
#     Typical range 4 – 8.
#
# warp_n : power applied to x before exponentiation.  n > 1 keeps the curve
#     flat near x = 0 and makes it rise sharply near the top label row.
#     n = 1 → pure exponential.  n = 2 → quadratic (flatter early).
#     n = 3 → cubic (flattest early, sharpest knee).
#
# sign is randomly +1 (warp right) or -1 (warp left) for each image.
warp_A_max = 0.3
warp_k_max = 8.0
warp_n = 2.0

# ---- Horizontal flip -------------------------------------------------------
# A horizontally flipped copy is generated only when the x-value of the point
# on the furthest row (last column in the CSV) deviates from this threshold.
# This avoids flipping images where the road is already centred.
# Set to -1.0 to disable flipping entirely.
flip_threshold = -1.0

# ---- Inpainting ------------------------------------------------------------
# Radius (pixels) used by the TELEA inpainting algorithm to fill void regions
# created by the shift. Larger values fill more smoothly but are slower.
inpaint_radius = 7
